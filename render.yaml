services:
  - type: web
    name: transperth-browser
    runtime: node
    plan: standard
    buildCommand: PLAYWRIGHT_BROWSERS_PATH=0 npm ci --no-audit --no-fund && PLAYWRIGHT_BROWSERS_PATH=0 npx --no-install playwright install chromium
    startCommand: PLAYWRIGHT_BROWSERS_PATH=0 npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: BROWSER_TOKEN
        sync: false
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
      - key: BROWSER_POOL_SIZE
        value: "3"
      - key: NAVIGATION_TIMEOUT_MS
        value: "12000"
      - key: ROW_WAIT_TIMEOUT_MS
        value: "6500"
      - key: LIVE_ROW_WAIT_TIMEOUT_MS
        value: "1800"
      - key: LIVE_SETTLE_MS
        value: "80"
      - key: BLOCK_STYLESHEETS
        value: "1"
      - key: QUEUE_TIMEOUT_MS
        value: "7000"
      - key: FRESH_CACHE_MS
        value: "10000"
      - key: STALE_CACHE_MS
        value: "60000"
      - key: MAX_CACHE_ENTRIES
        value: "160"
      - key: BATCH_MAX_STOPS
        value: "60"
      - key: BATCH_ROW_WAIT_TIMEOUT_MS
        value: "900"
      - key: BATCH_FRESH_CACHE_MS
        value: "90000"
      - key: BATCH_STALE_CACHE_MS
        value: "900000"
      - key: BATCH_CACHE_MAX_ENTRIES
        value: "32"
      - key: BATCH_KEEP_WARM_MS
        value: "300000"
      - key: BATCH_REFRESH_INTERVAL_MS
        value: "45000"
      - key: BATCH_REFRESH_LEAD_MS
        value: "15000"
      - key: BATCH_REFRESH_MAX_PER_TICK
        value: "2"
      - key: PAGE_MAX_USES
        value: "80"
      - key: MEMORY_CHECK_INTERVAL_MS
        value: "60000"
      - key: HEAP_SOFT_LIMIT_MB
        value: "650"
      - key: SERVICE_WARM_RECENT_MAX_ENTRIES
        value: "256"
      - key: WORKER_BASE_URL
        value: "https://twilight-wildflower-4e89.remy-hamilton.workers.dev"
      - key: SERVICE_WARM_MAX_FLEETS
        value: "12"
      - key: SERVICE_WARM_CONCURRENCY
        value: "2"
      - key: SERVICE_WARM_TIMEOUT_MS
        value: "30000"
      - key: SERVICE_WARM_FAILED_RECENT_MS
        value: "2000"
      - key: SERVICE_WARM_RECENT_MS
        value: "45000"
      - key: SERVICE_WARM_QUEUE_MAX
        value: "80"

