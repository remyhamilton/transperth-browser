services:
  - type: web
    name: transperth-browser
    runtime: node
    plan: standard
    buildCommand: PLAYWRIGHT_BROWSERS_PATH=0 npm ci --no-audit --no-fund && PLAYWRIGHT_BROWSERS_PATH=0 npx --no-install playwright install chromium
    startCommand: PLAYWRIGHT_BROWSERS_PATH=0 npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: BROWSER_TOKEN
        sync: false
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
      - key: BROWSER_POOL_SIZE
        value: "2"
      - key: NAVIGATION_TIMEOUT_MS
        value: "12000"
      - key: ROW_WAIT_TIMEOUT_MS
        value: "6500"
      - key: QUEUE_TIMEOUT_MS
        value: "7000"
      - key: FRESH_CACHE_MS
        value: "8000"
      - key: STALE_CACHE_MS
        value: "45000"
      - key: MAX_CACHE_ENTRIES
        value: "250"
      - key: BATCH_MAX_STOPS
        value: "60"
      - key: BATCH_ROW_WAIT_TIMEOUT_MS
        value: "900"
      - key: BATCH_FRESH_CACHE_MS
        value: "12000"
      - key: BATCH_STALE_CACHE_MS
        value: "90000"
      - key: BATCH_CACHE_MAX_ENTRIES
        value: "40"

